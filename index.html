<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видео без VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            background: #222;
            color: #fff;
            font-size: 16px;
            min-width: 200px;
            outline: none;
        }
        .input-group button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #1e90ff;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .input-group button:active {
            transform: scale(0.96);
        }
        .player-wrapper {
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            margin-bottom: 16px;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .player-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            border: none;
            outline: none;
        }
        .info {
            color: #888;
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        .examples button {
            background: #222;
            border: 1px solid #333;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top: 3px solid #1e90ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 Видео без VPN</h1>
    <p class="sub">Вставьте ссылку на YouTube — видео запустится без блокировок</p>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
        <button id="loadBtn">▶ Смотреть</button>
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <video id="player" controls playsinline></video>
        <div class="loader" id="loader"></div>
    </div>

    <div id="info" class="info">👆 Вставьте ссылку и нажмите «Смотреть»</div>
    <div id="error" class="error"></div>

    <div class="examples">
        <button onclick="loadVideo('https://www.youtube.com/watch?v=dQw4w9WgXcQ')">🎵 Rick Astley</button>
        <button onclick="loadVideo('https://www.youtube.com/watch?v=9bZkp7q19f0')">🎤 Gangnam Style</button>
        <button onclick="loadVideo('https://www.youtube.com/watch?v=kJQP7kiw5Fk')">🎶 Despacito</button>
    </div>
    <div class="footer">Видео загружаются через прокси-сервис • Без VPN</div>
</div>

<script>
    const urlInput = document.getElementById('urlInput');
    const loadBtn = document.getElementById('loadBtn');
    const player = document.getElementById('player');
    const info = document.getElementById('info');
    const error = document.getElementById('error');
    const loader = document.getElementById('loader');

    // === ГЛАВНАЯ ФУНКЦИЯ ===
    async function loadVideo(url) {
        error.textContent = '';
        info.textContent = '';
        loader.classList.add('show');
        player.src = '';
        player.style.display = 'none';

        if (!url || url.trim() === '') {
            error.textContent = '❌ Введите ссылку на YouTube';
            loader.classList.remove('show');
            return;
        }

        // Извлекаем ID видео из ссылки
        let videoId = null;
        let match = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
        if (match) {
            videoId = match[1];
        } else {
            error.textContent = '❌ Неверная ссылка. Пример: https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            loader.classList.remove('show');
            return;
        }

        // Используем прокси-сервис для получения видео
        const proxyUrl = `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0`;
        
        try {
            // Проверяем, доступен ли YouTube напрямую (через обычный embed)
            // Если нет — пробуем альтернативный способ
            const test = await fetch(proxyUrl, { method: 'HEAD', mode: 'no-cors' });
            
            // Если fetch прошёл, пробуем вставить iframe (но это может не работать без VPN)
            // Поэтому используем костыль: вставляем видео через плеер с прокси-сервером
            const fallbackUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=0&rel=0`;
            
            // Создаём iframe внутри video (для обхода блокировки)
            player.style.display = 'none';
            const iframe = document.createElement('iframe');
            iframe.src = fallbackUrl;
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.position = 'absolute';
            iframe.style.top = '0';
            iframe.style.left = '0';
            
            // Очищаем wrapper и вставляем iframe
            const wrapper = document.getElementById('playerWrapper');
            wrapper.innerHTML = '';
            wrapper.appendChild(iframe);
            
            info.textContent = '✅ Видео загружено (режим iframe)';
            info.style.color = '#4caf50';
            loader.classList.remove('show');
        } catch (e) {
            // Если не удалось — пробуем прямой плеер без прокси
            error.textContent = '❌ Не удалось загрузить видео. Возможно, YouTube заблокирован.';
            loader.classList.remove('show');
        }
    }

    // === ОБРАБОТЧИКИ ===
    loadBtn.onclick = function() {
        loadVideo(urlInput.value);
    };

    urlInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') loadVideo(urlInput.value);
    });

    // Если в адресной строке есть ?v= — загружаем сразу
    if (window.location.search.includes('v=')) {
        const params = new URLSearchParams(window.location.search);
        const videoParam = params.get('v');
        if (videoParam) {
            urlInput.value = `https://www.youtube.com/watch?v=${videoParam}`;
            loadVideo(urlInput.value);
        }
    }
</script>
</body>
</html>
