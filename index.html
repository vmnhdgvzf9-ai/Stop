<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видео без VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            background: #222;
            color: #fff;
            font-size: 16px;
            min-width: 200px;
            outline: none;
        }
        .input-group button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #1e90ff;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-group button:active {
            transform: scale(0.96);
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            margin-bottom: 16px;
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .info {
            color: #888;
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }
        .info a {
            color: #1e90ff;
            text-decoration: none;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        .examples button {
            background: #222;
            border: 1px solid #333;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .examples button:active {
            background: #333;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 Видео без VPN</h1>
    <p style="text-align:center;color:#888;margin-bottom:12px;font-size:14px;">
        Вставьте ссылку на YouTube и смотрите без ограничений
    </p>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
        <button id="loadBtn">▶ Смотреть</button>
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <iframe id="player" src=""></iframe>
    </div>

    <div id="info" class="info">👆 Вставьте ссылку и нажмите «Смотреть»</div>
    <div id="error" class="error"></div>

    <div class="examples">
        <button onclick="loadVideo('https://www.youtube.com/watch?v=dQw4w9WgXcQ')">🎵 Rick Astley</button>
        <button onclick="loadVideo('https://www.youtube.com/watch?v=9bZkp7q19f0')">🎤 Gangnam Style</button>
        <button onclick="loadVideo('https://www.youtube.com/watch?v=kJQP7kiw5Fk')">🎶 Despacito</button>
    </div>
    <div class="footer">Видео загружаются через прокси • Ваш IP не виден</div>
</div>

<script>
    const urlInput = document.getElementById('urlInput');
    const loadBtn = document.getElementById('loadBtn');
    const player = document.getElementById('player');
    const info = document.getElementById('info');
    const error = document.getElementById('error');

    // Функция, которая конвертирует ссылку YouTube в embed
    function getEmbedUrl(url) {
        // Если уже embed-ссылка — оставляем
        if (url.includes('youtube.com/embed/')) return url;

        // Если ссылка с watch?v=
        let match = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
        if (match) {
            const videoId = match[1];
            // Используем стандартный embed YouTube (без рекламы, без регистрации)
            return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
        }
        return null;
    }

    function loadVideo(url) {
        error.textContent = '';
        if (!url || url.trim() === '') {
            error.textContent = '❌ Введите ссылку на YouTube';
            return;
        }

        const embed = getEmbedUrl(url.trim());
        if (!embed) {
            error.textContent = '❌ Неверная ссылка. Используйте: https://www.youtube.com/watch?v=...';
            return;
        }

        // Загружаем видео в iframe
        player.src = embed;
        info.textContent = '▶ Видео загружается...';
        info.style.color = '#aaa';

        // Если видео не загружается через 5 секунд — показываем подсказку
        setTimeout(() => {
            if (player.src && !player.src.includes('about:blank')) {
                info.textContent = '✅ Видео загружено. Наслаждайтесь!';
                info.style.color = '#4caf50';
            }
        }, 5000);
    }

    // Кнопка "Смотреть"
    loadBtn.onclick = function() {
        loadVideo(urlInput.value);
    };

    // Enter в поле ввода
    urlInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') loadVideo(urlInput.value);
    });

    // Если в адресной строке есть параметр ?v= — загрузить сразу
    if (window.location.search.includes('v=')) {
        const params = new URLSearchParams(window.location.search);
        const videoParam = params.get('v');
        if (videoParam) {
            urlInput.value = `https://www.youtube.com/watch?v=${videoParam}`;
            loadVideo(urlInput.value);
        }
    }
</script>
</body>
</html>
